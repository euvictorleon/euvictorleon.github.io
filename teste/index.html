<style>
  :root {
    --bg: #eef3f9;
    --header: #0f172a;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #dbe3ef;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success: #16a34a;
    --warning: #f59e0b;
    --dark: #334155;
    --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    --radius: 16px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Inter, Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: linear-gradient(135deg, #0f172a, #111827);
    color: #ffffff;
    padding: 28px 32px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  header h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  header p {
    margin: 8px 0 0;
    color: #cbd5e1;
    font-size: 15px;
  }

  main {
    width: min(100% - 48px, 1400px);
    margin: 0 auto;
    padding: 24px 0 56px;
  }

  .search-box {
    background: var(--card);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(219, 227, 239, 0.8);
    margin-bottom: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 150px;
    gap: 14px;
    align-items: end;
  }

  label {
    display: block;
    font-size: 13px;
    color: #475569;
    margin-bottom: 7px;
    font-weight: 800;
  }

  input {
    width: 100%;
    height: 46px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0 14px;
    font-size: 14px;
    outline: none;
    color: var(--text);
    background: #ffffff;
    transition: 0.15s ease;
  }

  input::placeholder {
    color: #94a3b8;
  }

  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  }

  button {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    min-height: 44px;
    font-weight: 800;
    cursor: pointer;
    transition: 0.18s ease;
    font-size: 14px;
    white-space: nowrap;
  }

  button:hover:not(:disabled) {
    transform: translateY(-1px);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
    transform: none;
  }

  .btn-primary {
    background: var(--primary);
    color: #ffffff;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  .btn-success {
    background: var(--success);
    color: #ffffff;
  }

  .btn-warning {
    background: var(--warning);
    color: #ffffff;
  }

  .btn-secondary {
    background: var(--dark);
    color: #ffffff;
  }

  .btn-light {
    background: #e2e8f0;
    color: #334155;
  }

  .status-message {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 14px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    color: #1e40af;
    font-weight: 800;
    display: none;
  }

  .status-message.show {
    display: block;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 18px;
  }

  .stat {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 18px 16px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(219, 227, 239, 0.8);
  }

  .stat strong {
    display: block;
    font-size: 28px;
    line-height: 1;
    margin-bottom: 9px;
    font-weight: 900;
    letter-spacing: -0.04em;
  }

  .stat span {
    color: #475569;
    font-size: 13px;
    font-weight: 700;
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin: 6px 0 14px;
    flex-wrap: wrap;
  }

  .tab {
    background: #ffffff;
    color: #0f172a;
    border: 1px solid var(--border);
    min-width: 118px;
  }

  .tab.active {
    background: #0f172a;
    color: #ffffff;
    border-color: #0f172a;
  }

  .panel {
    display: none;
  }

  .panel.active {
    display: block;
  }

  .actions-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(219, 227, 239, 0.9);
    padding: 12px;
    border-radius: 16px;
    margin-bottom: 16px;
    backdrop-filter: blur(6px);
  }

  .lead-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 16px;
    align-items: stretch;
  }

  .lead-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 18px;
    border: 1px solid rgba(219, 227, 239, 0.95);
    box-shadow: var(--shadow);
    position: relative;
    min-height: 250px;
    transition: 0.18s ease;
  }

  .lead-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 38px rgba(15, 23, 42, 0.11);
  }

  .lead-card.selected {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15), var(--shadow);
  }

  .lead-card.used {
    opacity: 0.48;
    filter: grayscale(1);
    background: #f8fafc;
  }

  .lead-card.used:hover {
    transform: none;
  }

  .lead-card h3 {
    margin: 10px 34px 10px 0;
    font-size: 18px;
    line-height: 1.25;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .lead-card p {
    margin: 8px 0;
    font-size: 14px;
    line-height: 1.4;
    color: #334155;
    word-break: break-word;
  }

  .lead-card a {
    color: var(--primary);
    font-weight: 800;
    text-decoration: none;
  }

  .lead-card a:hover {
    text-decoration: underline;
  }

  .lead-card .muted {
    color: var(--muted);
    font-size: 13px;
  }

  .check-area {
    position: absolute;
    top: 18px;
    right: 18px;
  }

  .check-area input {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--primary);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 900;
    color: #ffffff;
    margin-bottom: 2px;
  }

  .badge-new {
    background: var(--primary);
  }

  .badge-saved {
    background: var(--success);
  }

  .badge-crm {
    background: var(--warning);
  }

  .lead-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #edf2f7;
  }

  .lead-actions button {
    padding: 10px 12px;
    min-height: 38px;
    font-size: 13px;
  }

  .empty {
    grid-column: 1 / -1;
    background: #ffffff;
    border-radius: 18px;
    padding: 52px 24px;
    min-height: 180px;
    text-align: center;
    color: #475569;
    border: 1px dashed #b8c4d6;
    box-shadow: var(--shadow);
    font-size: 16px;
    line-height: 1.5;
  }

  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
  }

  .pagination span {
    font-weight: 800;
    color: #334155;
  }

  @media (max-width: 1180px) {
    .grid {
      grid-template-columns: 1fr 1fr;
    }

    .stats {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 820px) {
    main {
      width: min(100% - 28px, 100%);
      padding-top: 16px;
    }

    header {
      padding: 24px 18px;
    }

    header h1 {
      font-size: 24px;
    }

    .grid {
      grid-template-columns: 1fr;
    }

    .stats {
      grid-template-columns: repeat(2, 1fr);
    }

    .lead-list {
      grid-template-columns: 1fr;
    }

    .actions-bar {
      flex-direction: column;
    }

    button {
      width: 100%;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .tab {
      min-width: 0;
    }

    .pagination {
      flex-wrap: wrap;
    }
  }

  @media (max-width: 520px) {
    .stats {
      grid-template-columns: 1fr;
    }

    .tabs {
      grid-template-columns: 1fr;
    }

    .search-box,
    .stat,
    .lead-card,
    .empty {
      border-radius: 14px;
    }
  }
</style>
