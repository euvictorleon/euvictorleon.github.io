<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Leads - Sistema</title>
    <!-- Tailwind CSS para um layout profissional, limpo e moderno sem precisar de arquivos extras -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Sua API do Google Maps carregada corretamente -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBRd4KUJR3Rk4k98OOJVDtSfExn4ENVq0U&libraries=places"></script>

    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { background-color: #2563eb; color: white; }
        .tab-btn.active i { color: white; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex text-gray-800">

    <!-- Menu Lateral (Sidebar) -->
    <aside class="w-64 bg-white shadow-xl flex flex-col fixed h-full">
        <div class="p-6 border-b border-gray-200">
            <h1 class="text-2xl font-bold text-blue-600"><i class="fa-solid fa-bolt mr-2"></i>LeadExtractor</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <!-- Abas do Sistema -->
            <button onclick="mudarAba('aba-extrator')" id="btn-aba-extrator" class="tab-btn active w-full flex items-center text-left p-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-magnifying-glass w-6 text-gray-400"></i> Buscar Leads
            </button>
            <button onclick="mudarAba('aba-crm')" id="btn-aba-crm" class="tab-btn w-full flex items-center text-left p-3 rounded-lg text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="fa-solid fa-users w-6 text-gray-400"></i> Meus Leads Salvos
            </button>
        </nav>
        <div class="p-4 border-t border-gray-200 text-sm text-gray-500 text-center">
            Painel do Victor
        </div>
    </aside>

    <!-- Área Principal -->
    <main class="ml-64 flex-1 p-8">
        
        <!-- ABA 1: EXTRATOR DE LEADS -->
        <section id="aba-extrator" class="tab-content active max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold mb-6 text-gray-800">Nova Busca de Leads</h2>
            
            <!-- Painel de Busca -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Nicho / Tipo de Empresa</label>
                        <input type="text" id="input-nicho" placeholder="Ex: Clínicas Odontológicas, Padarias..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-2">Localização</label>
                        <input type="text" id="input-local" placeholder="Ex: Maringá - PR" value="Maringá" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <button onclick="executarExtracao()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-colors flex items-center h-[50px]">
                        <i class="fa-solid fa-radar flex mr-2"></i> Extrair Agora
                    </button>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden text-center py-10">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-3"></i>
                <p class="text-gray-500 font-medium">Buscando empresas no Google Places...</p>
            </div>

            <!-- Tabela de Resultados -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="p-4 font-semibold text-gray-600">Nome da Empresa</th>
                            <th class="p-4 font-semibold text-gray-600">Endereço Completo</th>
                            <th class="p-4 font-semibold text-gray-600">Avaliação</th>
                            <th class="p-4 font-semibold text-gray-600 text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-resultados">
                        <tr>
                            <td colspan="4" class="p-8 text-center text-gray-400">
                                <i class="fa-solid fa-inbox text-3xl mb-2 block"></i>
                                Os leads extraídos aparecerão aqui em formato de tabela.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Div oculta necessária para a API do Google Places funcionar -->
            <div id="mapa-oculto" style="display: none;"></div>
        </section>

        <!-- ABA 2: MEUS LEADS SALVOS -->
        <section id="aba-crm" class="tab-content max-w-6xl mx-auto">
            <h2 class="text-3xl font-bold mb-6 text-gray-800">Leads Salvos</h2>
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="p-4 font-semibold text-gray-600">Empresa</th>
                            <th class="p-4 font-semibold text-gray-600">Endereço</th>
                            <th class="p-4 font-semibold text-gray-600 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-salvos">
                        <!-- Leads salvos entrarão aqui -->
                    </tbody>
                </table>
                <div id="msg-sem-leads" class="p-8 text-center text-gray-400">
                    <i class="fa-solid fa-folder-open text-3xl mb-2 block"></i>
                    Você ainda não salvou nenhum lead.
                </div>
            </div>
        </section>

    </main>

    <script>
        // Lógica de Alternância das Abas (Mantendo seu formato)
        function mudarAba(idAba) {
            // Oculta tudo
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active', 'bg-blue-600', 'text-white'));
            
            // Mostra a selecionada
            document.getElementById(idAba).classList.add('active');
            const btn = document.getElementById('btn-' + idAba);
            btn.classList.add('active');
            
            // Corrige cores dos ícones nas abas inativas
            document.querySelectorAll('.tab-btn i').forEach(i => i.classList.replace('text-white', 'text-gray-400'));
            btn.querySelector('i').classList.replace('text-gray-400', 'text-white');
        }

        // Lógica de Extração de Leads usando a sua API (Sem ir para o Google, traz para a tabela)
        function executarExtracao() {
            const nicho = document.getElementById('input-nicho').value.trim();
            const local = document.getElementById('input-local').value.trim();
            
            if (!nicho || !local) {
                alert("Por favor, preencha o Nicho e a Localização antes de buscar!");
                return;
            }

            const query = `${nicho} em ${local}`;
            
            // UI States
            document.getElementById('tabela-resultados').innerHTML = '';
            document.getElementById('loader').classList.remove('hidden');

            // Instanciando serviço do Google Places no mapa oculto
            const map = new google.maps.Map(document.getElementById('mapa-oculto'), {
                center: {lat: -23.421, lng: -51.933}, // Coordenadas de Maringá como default
                zoom: 15
            });
            const service = new google.maps.places.PlacesService(map);

            // Buscando as empresas pela API
            service.textSearch({ query: query }, function(results, status) {
                document.getElementById('loader').classList.add('hidden');
                const tbody = document.getElementById('tabela-resultados');

                if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
                    let html = '';
                    results.forEach((place) => {
                        // Limpando aspas para evitar erro no botão de salvar
                        const nomeLimpo = place.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        const endLimpo = (place.formatted_address || "Endereço não informado").replace(/'/g, "\\'").replace(/"/g, "&quot;");
                        const avaliacao = place.rating ? `<span class="bg-yellow-100 text-yellow-800 py-1 px-2 rounded font-bold text-sm"><i class="fa-solid fa-star text-yellow-500 mr-1"></i>${place.rating}</span>` : '<span class="text-gray-400">Sem avaliação</span>';

                        html += `
                            <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                                <td class="p-4 font-medium text-gray-800">${place.name}</td>
                                <td class="p-4 text-gray-600 text-sm">${place.formatted_address}</td>
                                <td class="p-4">${avaliacao}</td>
                                <td class="p-4 text-center">
                                    <button onclick="salvarLead('${nomeLimpo}', '${endLimpo}')" class="bg-green-100 hover:bg-green-200 text-green-700 font-semibold py-1 px-3 rounded text-sm transition-colors">
                                        <i class="fa-solid fa-plus mr-1"></i> Salvar
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" class="p-8 text-center text-red-500">
                                <i class="fa-solid fa-circle-exclamation text-3xl mb-2 block"></i>
                                Nenhuma empresa encontrada ou erro na API do Google. Tente termos diferentes.
                            </td>
                        </tr>
                    `;
                }
            });
        }

        // Sistema simples de salvar na outra aba
        function salvarLead(nome, endereco) {
            const tabelaSalvos = document.getElementById('tabela-salvos');
            document.getElementById('msg-sem-leads').style.display = 'none';

            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-100 hover:bg-gray-50";
            tr.innerHTML = `
                <td class="p-4 font-medium text-gray-800">${nome}</td>
                <td class="p-4 text-gray-600 text-sm">${endereco}</td>
                <td class="p-4 text-center">
                    <span class="bg-blue-100 text-blue-700 py-1 px-2 rounded text-xs font-bold">Capturado</span>
                </td>
            `;
            
            tabelaSalvos.appendChild(tr);
            alert(`Lead "${nome}" salvo com sucesso na aba Meus Leads!`);
        }
    </script>
</body>
</html>
